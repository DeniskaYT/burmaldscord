<!DOCTYPE html>
<html>
<head>
    <title>Бурмалдскорд</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; }
        #messages { list-style-type: none; margin: 0; padding: 20px; }
        #form { display: flex; position: fixed; bottom: 0; width: 100%; padding: 10px; background: #222; }
        input { flex-grow: 1; padding: 10px; background: #333; color: #fff; border: none; }
        button { padding: 10px 20px; background: #4CAF50; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <ul id="messages"></ul>
    <form id="form">
        <input id="input" autocomplete="off" placeholder="Пиши сюда, боец..." />
        <button>Отправить</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        var socket = io();
        var form = document.getElementById('form');
        var input = document.getElementById('input');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            if (input.value) {
                socket.emit('chat message', input.value);
                input.value = '';
            }
        });

        socket.on('chat message', function(msg) {
            var item = document.createElement('li');
            item.textContent = msg;
            document.getElementById('messages').appendChild(item);
        });
    </script>
</body>
</html>
