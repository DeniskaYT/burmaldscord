<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BURMALDSCORD | BLACK OPS</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 260px; background: #000; border-right: 2px solid #111; padding: 20px; display: flex; flex-direction: column; }
        #main { flex: 1; display: flex; flex-direction: column; background: #080808; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; font-family: 'Consolas', monospace; }
        #controls { padding: 20px; background: #000; border-top: 2px solid #111; display: flex; gap: 10px; }
        input { background: #111; color: #00ff41; border: 1px solid #222; padding: 12px; flex: 1; border-radius: 5px; outline: none; }
        input:focus { border-color: #00ff41; }
        button { background: #00ff41; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; transition: 0.3s; }
        button:hover { background: #fff; transform: scale(1.05); }
        .user-item { padding: 10px; margin-bottom: 5px; background: #111; border-radius: 4px; display: flex; align-items: center; gap: 10px; }
        .dot { height: 8px; width: 8px; background: #00ff41; border-radius: 50%; box-shadow: 0 0 5px #00ff41; }
        #voice-area { margin-top: auto; border-top: 1px solid #222; padding-top: 20px; }
        .mute-btn { width: 100%; background: #ff4d4d; color: white; margin-top: 10px; }
        .msg-line { margin-bottom: 8px; border-left: 2px solid #222; padding-left: 10px; }
        .username { color: #888; font-size: 0.8em; margin-right: 5px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2 style="letter-spacing: 2px; border-bottom: 1px solid #111; padding-bottom: 10px;">HQ ONLINE</h2>
        <div id="user-list"></div>
        <div id="voice-area">
            <button id="call-btn" style="width: 100%;">ВКЛЮЧИТЬ ГОЛОС</button>
            <button id="mute-btn" class="mute-btn" style="display:none;">MUTE</button>
        </div>
    </div>
    <div id="main">
        <div id="chat"></div>
        <div id="controls">
            <input id="msg" placeholder="Доклад в штаб..." autocomplete="off" />
            <button onclick="send()">SEND</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        const socket = io();
        let myName = prompt("Введите ваш позывной:", "Боец") || "Аноним";
        const userList = document.getElementById('user-list');
        const chat = document.getElementById('chat');
        const msgInput = document.getElementById('msg');
        const muteBtn = document.getElementById('mute-btn');
        
        const peer = new Peer(undefined, { host: '/', port: '443', path: '/peerjs', secure: true });
        let myStream;

        // Регистрация на сервере
        peer.on('open', id => {
            socket.emit('register-user', { peerId: id, name: myName });
        });

        // Список юзеров
        socket.on('update-user-list', users => {
            userList.innerHTML = '';
            users.forEach(u => {
                const div = document.createElement('div');
                div.className = 'user-item';
                div.innerHTML = <div class="dot"></div> <span>\</span>;
                userList.appendChild(div);
            });
        });

        // Голосовая магия
        document.getElementById('call-btn').onclick = async () => {
            try {
                myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                document.getElementById('call-btn').style.display = 'none';
                muteBtn.style.display = 'block';
                
                socket.emit('join-voice-room', peer.id);

                peer.on('call', call => {
                    call.answer(myStream);
                    const audio = document.createElement('audio');
                    call.on('stream', stream => { audio.srcObject = stream; audio.play(); });
                });

                socket.on('user-connected-voice', userId => {
                    const call = peer.call(userId, myStream);
                    const audio = document.createElement('audio');
                    call.on('stream', stream => { audio.srcObject = stream; audio.play(); });
                });
            } catch (e) { alert("Микрофон не найден!"); }
        };

        muteBtn.onclick = () => {
            const enabled = myStream.getAudioTracks()[0].enabled;
            myStream.getAudioTracks()[0].enabled = !enabled;
            muteBtn.textContent = !enabled ? 'MUTE' : 'UNMUTE';
            muteBtn.style.background = !enabled ? '#ff4d4d' : '#00ff41';
        };

        // Чат
        function send() {
            if(msgInput.value) {
                socket.emit('chat message', { name: myName, text: msgInput.value });
                msgInput.value = '';
            }
        }
        msgInput.addEventListener('keypress', e => { if(e.key === 'Enter') send(); });
        socket.on('chat message', m => {
            const div = document.createElement('div');
            div.className = 'msg-line';
            div.innerHTML = <span class="username">\:</span> \;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        });
    </script>
</body>
</html>
