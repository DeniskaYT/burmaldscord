<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BURMALDSCORD | STABLE</title>
    <style>
        body { background: #000; color: #00ff41; font-family: sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; display: flex; align-items: center; justify-content: center; }
        .auth-card { border: 2px solid #00ff41; padding: 30px; text-align: center; background: #050505; }
        #app { display: none; height: 100vh; flex-direction: row; }
        #sidebar { width: 250px; border-right: 1px solid #222; padding: 20px; }
        #main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chat { flex: 1; padding: 20px; overflow-y: auto; font-family: monospace; }
        #controls { padding: 20px; border-top: 1px solid #222; display: flex; gap: 10px; }
        input { background: #111; color: #00ff41; border: 1px solid #333; padding: 10px; border-radius: 5px; outline: none; }
        button { background: #00ff41; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }
        #call-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .avatar { width: 150px; height: 150px; border-radius: 50%; border: 4px solid #00ff41; animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(2px, 2px); } }
    </style>
</head>
<body>
    <div id="auth-overlay">
        <div class="auth-card">
            <h2>ВХОД В ШТАБ</h2>
            <input id="nick-input" placeholder="Твой позывной..." />
            <button onclick="startApp()">ВОЙТИ</button>
        </div>
    </div>

    <div id="app">
        <div id="sidebar">
            <h3>В СЕТИ</h3>
            <div id="user-list"></div>
            <div style="margin-top: 20px;">
                <input id="target-id" placeholder="ID кента" style="width: 150px;" />
                <button onclick="callUser()" style="margin-top: 10px; width: 100%;">ПОЗВОНИТЬ</button>
            </div>
        </div>
        <div id="main">
            <div id="call-overlay">
                <h1 style="color: #00ff41;">ВХОДЯЩИЙ ВЫЗОВ</h1>
                <img src="/mell.png" class="avatar" onerror="this.src='https://i.postimg.cc/85zXpxYy/image.png'">
                <h2 id="caller-name">ДРУН</h2>
                <div style="margin-top: 20px; display: flex; gap: 20px;">
                    <button onclick="acceptCall()" style="background: #00c851;">ПРИНЯТЬ</button>
                    <button onclick="rejectCall()" style="background: #ff3547;">СБРОСИТЬ</button>
                </div>
                <audio id="ringtone" loop src="/ringtone.mp3"></audio>
            </div>
            <div id="chat"></div>
            <div id="controls">
                <input id="msg" style="flex: 1;" placeholder="Сообщение..." />
                <button onclick="sendMsg()">ОТПРАВИТЬ</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        const socket = io();
        let myPeer, myStream, currentCall, myNick;

        function startApp() {
            myNick = document.getElementById('nick-input').value;
            if(!myNick) return alert("Введи имя!");
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            initPeer();
        }

        function initPeer() {
            myPeer = new Peer(undefined, { host: '/', port: '443', path: '/peerjs', secure: true });
            
            myPeer.on('open', id => {
                socket.emit('register-user', { peerId: id, name: myNick });
                console.log("Connected as: " + id);
            });

            myPeer.on('call', call => {
                currentCall = call;
                document.getElementById('call-overlay').style.display = 'flex';
                document.getElementById('ringtone').play();
            });
        }

        async function acceptCall() {
            myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            currentCall.answer(myStream);
            const audio = document.createElement('audio');
            currentCall.on('stream', s => { audio.srcObject = s; audio.play(); });
            closeOverlay();
        }

        function rejectCall() { currentCall.close(); closeOverlay(); }
        function closeOverlay() { 
            document.getElementById('call-overlay').style.display = 'none';
            document.getElementById('ringtone').pause();
        }

        async function callUser() {
            const id = document.getElementById('target-id').value;
            myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const call = myPeer.call(id, myStream);
            const audio = document.createElement('audio');
            call.on('stream', s => { audio.srcObject = s; audio.play(); });
        }

        function sendMsg() {
            const m = document.getElementById('msg').value;
            if(m) { socket.emit('chat message', { name: myNick, text: m }); document.getElementById('msg').value = ''; }
        }

        socket.on('chat message', m => {
            const d = document.createElement('div');
            d.innerHTML = <b>\:</b> \;
            document.getElementById('chat').appendChild(d);
        });

        socket.on('update-user-list', users => {
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            users.forEach(u => {
                if(u.id === myPeer.id) return;
                const item = document.createElement('div');
                item.innerHTML = ● \ <br> <small style="color:#444">\</small>;
                item.style.cursor = 'pointer';
                item.onclick = () => document.getElementById('target-id').value = u.id;
                list.appendChild(item);
            });
        });
    </script>
</body>
</html>
