<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BURMALDSCORD | BLACK OPS V6</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Сайдбар */
        #sidebar { width: 260px; background: #000; border-right: 2px solid #111; padding: 20px; display: flex; flex-direction: column; z-index: 10; }
        .user-item { padding: 10px; margin-bottom: 5px; background: #111; border-radius: 4px; display: flex; align-items: center; gap: 10px; border: 1px solid transparent; }
        .user-item.calling { border-color: #00ff41; animation: pulse 1.5s infinite; }
        .dot { height: 8px; width: 8px; background: #00ff41; border-radius: 50%; box-shadow: 0 0 5px #00ff41; }
        
        /* Главная зона */
        #main { flex: 1; display: flex; flex-direction: column; background: #080808; position: relative; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; font-family: 'Consolas', monospace; filter: blur(0px); transition: filter 0.3s; }
        #controls { padding: 20px; background: #000; border-top: 2px solid #111; display: flex; gap: 10px; }
        input { background: #111; color: #00ff41; border: 1px solid #222; padding: 12px; flex: 1; border-radius: 5px; outline: none; }
        button { background: #111; color: #00ff41; border: 1px solid #00ff41; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; transition: 0.3s; text-transform: uppercase;}
        button:hover { background: #00ff41; color: #000; }

        /* --- ОВЕРЛЕЙ ЗВОНКА (КАК НА СКРИНЕ) --- */
        #call-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.85); 
            display: none; /* Скрыт по дефолту */
            flex-direction: column; align-items: center; justify-content: center; 
            z-index: 100; backdrop-filter: blur(5px);
        }
        
        .call-card {
            background: #000; border: 2px solid #00ff41; border-radius: 15px;
            padding: 40px; text-align: center; box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
            width: 350px;
        }

        .avatar-container { position: relative; margin-bottom: 20px; }
        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #00ff41; object-fit: cover; }
        .ring { position: absolute; top: -10px; left: -10px; width: 140px; height: 140px; border-radius: 50%; border: 2px solid #00ff41; animation: ring-pulse 2s infinite; opacity: 0; }

        .caller-status { color: #00ff41; font-size: 1.2em; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; animation: blink 1s infinite; }
        .caller-name { color: #fff; font-size: 2.5em; font-weight: bold; margin-bottom: 30px; }

        .call-buttons { display: flex; justify-content: center; gap: 40px; width: 100%; }
        .btn-call { width: 80px; height: 80px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-accept { background: #00c851; box-shadow: 0 0 15px #00c851; }
        .btn-decline { background: #ff3547; box-shadow: 0 0 15px #ff3547; }
        .btn-call:hover { transform: scale(1.1); filter: brightness(1.2); }
        .btn-call img { width: 40px; height: 40px; filter: invert(1); } /* Иконки белые */

        /* Анимации */
        @keyframes blink { 50% { opacity: 0; } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(0, 255, 65, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0); } }
        @keyframes ring-pulse { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.2); opacity: 0; } }
        
        /* Для заблюривания чата */
        .blur { filter: blur(10px) !important; }
            .avatar { 
            width: 140px; height: 140px; border-radius: 50%; 
            border: 4px solid #00ff41; object-fit: cover; 
            animation: shake 0.5s infinite; 
        }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
        } </style>
</head>
<body>
    <div id="sidebar">
        <h2 style="letter-spacing: 2px; border-bottom: 1px solid #111; padding-bottom: 10px; text-align:center;">БИРЖА КЕНТОВ</h2>
        <div id="user-list">
            <div class="user-item"><div class="dot"></div> <span>Система (Ждем деплой)</span></div>
        </div>
        <div style="margin-top:auto; padding-top:20px; border-top: 1px solid #111;">
             <input id="target-id" placeholder="ID кента для звонка" style="width: 80%; margin-bottom:10px; font-size:0.8em;"/>
             <button id="call-btn" style="width: 100%;">ПОЗВОНИТЬ</button>
        </div>
    </div>
    
    <div id="main">
        <div id="call-overlay">
            <div class="call-card">
                <div class="caller-status">Входящий вызов</div>
                <div class="avatar-container">
                    <img src="https://i.postimg.cc/85zXpxYy/image.png" class="avatar" id="caller-avatar"> <div class="ring"></div>
                </div>
                <div class="caller-name" id="caller-name">ДРУН</div> <div class="call-buttons">
                    <button class="btn-call btn-decline" id="reject-btn">
                        <img src="https://img.icons8.com/ios-filled/50/000000/end-call.png"/>
                    </button>
                    <button class="btn-call btn-accept" id="accept-btn">
                        <img src="https://img.icons8.com/ios-filled/50/000000/phone.png"/>
                    </button>
                </div>
            </div>
            <audio id="ringtone" loop src="https://www.myinstants.com/media/sounds/discord-call.mp3"></audio> </div>

        <div id="chat"></div>
        <div id="controls">
            <input id="msg" placeholder="Доклад в штаб..." autocomplete="off" />
            <button onclick="send()">SEND</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        const socket = io();
        let myName = prompt("Введите ваш позывной для Биржи Кентов:", "Боец") || "Аноним";
        const peer = new Peer(undefined, { host: '/', port: '443', path: '/peerjs', secure: true });
        
        // Элементы интерфейса звонка
        const overlay = document.getElementById('call-overlay');
        const chatArea = document.getElementById('chat');
        const ringtone = document.getElementById('ringtone');
        const callerNameEl = document.getElementById('caller-name');
        
        let currentCall; // Для хранения текущего вызова PeerJS
        let myStream;

        // --- ЛОГИКА ЗВОНКА V6 ---

        // 1. Принимаем входящий звонок (PeerJS)
        peer.on('call', call => {
            currentCall = call;
            const callerId = call.peer;
            
            // Находим имя звонящего в списке (если есть)
            const callerData = activeUsers.find(u => u.id === callerId);
            callerNameEl.textContent = callerData ? callerData.name : 'НЕИЗВЕСТНЫЙ КЕНТ';
            
            showCallOverlay();
        });

        // 2. Кнопка "Принять"
        document.getElementById('accept-btn').onclick = async () => {
            try {
                myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                currentCall.answer(myStream); // Отвечаем своим стримом
                
                const audio = document.createElement('audio');
                currentCall.on('stream', userStream => { 
                    audio.srcObject = userStream; audio.play(); 
                });
                
                hideCallOverlay();
                console.log("Звонок принят.");
            } catch (e) { alert("Микрофон не найден!"); hideCallOverlay(); }
        };

        // 3. Кнопка "Сбросить"
        document.getElementById('reject-btn').onclick = () => {
            currentCall.close(); // Закрываем соединение PeerJS
            hideCallOverlay();
            console.log("Звонок сброшен.");
        };

        // 4. Инициация исходящего звонка
        document.getElementById('call-btn').onclick = async () => {
            const targetId = document.getElementById('target-id').value;
            if(!targetId) return alert("Введи ID кента!");
            
            try {
                myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const call = peer.call(targetId, myStream);
                currentCall = call; // Запоминаем, чтобы можно было сбросить

                const audio = document.createElement('audio');
                call.on('stream', userStream => { 
                    audio.srcObject = userStream; audio.play(); 
                });
                
                console.log("Звоним кенту: " + targetId);
            } catch (e) { alert("Ошибка микрофона!"); }
        };

        // Вспомогательные функции интерфейса
        function showCallOverlay() {
            overlay.style.display = 'flex';
            chatArea.classList.add('blur');
            ringtone.play();
        }

        function hideCallOverlay() {
            overlay.style.display = 'none';
            chatArea.classList.remove('blur');
            ringtone.pause(); ringtone.currentTime = 0;
        }


        // --- СТАНДАРТНАЯ БАЗА (ЧАТ И СПИСОК) ---
        let activeUsers = [];

        peer.on('open', id => {
            socket.emit('register-user', { peerId: id, name: myName });
            console.log("Мой ID PeerJS: " + id);
            // Добавим себя в список (локально) для теста
            const div = document.createElement('div');
            div.className = 'user-item';
            div.innerHTML = <div class="dot"></div> <span>\ (ВЫ)</span> <br> <span style='font-size:0.7em; color:#555'>ID: \</span>;
            document.getElementById('user-list').prepend(div);
        });

        socket.on('update-user-list', users => {
            activeUsers = users;
            const listEl = document.getElementById('user-list');
            listEl.innerHTML = '';
            users.forEach(u => {
                if(u.id === peer.id) return; // Себя не показываем
                const div = document.createElement('div');
                div.className = 'user-item';
                div.innerHTML = <div class="dot"></div> <span>\</span> <br> <span style='font-size:0.7em; color:#555'>ID: \</span>;
                // Клик по юзеру подставляет его ID в поле звонка
                div.onclick = () => { document.getElementById('target-id').value = u.id; };
                listEl.appendChild(div);
            });
        });

        const chat = document.getElementById('chat');
        const msgInput = document.getElementById('msg');
        function send() {
            if(msgInput.value) {
                socket.emit('chat message', { name: myName, text: msgInput.value });
                msgInput.value = '';
            }
        }
        msgInput.addEventListener('keypress', e => { if(e.key === 'Enter') send(); });
        socket.on('chat message', m => {
            const div = document.createElement('div');
            div.innerHTML = <span style='color:#888'>\:</span> \;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        });
    </script>
</body>
</html>
