<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BURMALDSCORD | HQ</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Consolas', monospace; margin: 0; overflow: hidden; }
        #auth-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-card { border: 2px solid #00ff41; padding: 40px; background: #0a0a0a; text-align: center; }
        #app { display: none; height: 100vh; display: flex; }
        #sidebar { width: 300px; border-right: 1px solid #111; padding: 20px; }
        #main { flex: 1; position: relative; background: #080808; display: flex; flex-direction: column; }
        #chat { flex: 1; padding: 20px; overflow-y: auto; }
        #call-overlay { 
            position: absolute; inset: 0; background: rgba(0,0,0,0.95); 
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; 
        }
        .caller-avatar { width: 220px; height: 220px; border-radius: 50%; border: 5px solid #00ff41; animation: shake 0.2s infinite; }
        .caller-name { font-size: 4em; color: #fff; margin: 30px 0; font-weight: bold; }
        .btn { width: 80px; height: 80px; border-radius: 50%; border: none; cursor: pointer; margin: 0 20px; font-size: 2em; }
        @keyframes shake { 0% { transform: rotate(0deg); } 50% { transform: rotate(3deg); } 100% { transform: rotate(0deg); } }
    </style>
</head>
<body>
    <div id="auth-overlay"><div class="auth-card"><h1>BURMALDSCORD</h1><input id="nick" placeholder="НИК..."><br><br><button onclick="start()">ВХОД</button></div></div>
    <div id="app">
        <div id="sidebar"><div id="user-list"></div><br><input id="tid" placeholder="ID"><button onclick="call()">ЗВОНОК</button></div>
        <div id="main">
            <div id="call-overlay">
                <img src="https://i.postimg.cc/85zXpxYy/image.png" class="caller-avatar">
                <div class="caller-name">ДРУН</div>
                <div><button class="btn" style="background:#ff3547" onclick="reject()">✖</button><button class="btn" style="background:#00c851" onclick="accept()">✔</button></div>
                <audio id="ring" loop src="ringtone.mp3"></audio>
            </div>
            <div id="chat"></div>
            <div style="padding:20px; display:flex"><input id="msg" style="flex:1"><button onclick="send()">БАЗАР</button></div>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        const socket = io(); let myPeer, myStream, currentCall, myNick;
        function start() {
            myNick = document.getElementById('nick').value; if(!myNick) return;
            document.getElementById('auth-overlay').style.display='none'; document.getElementById('app').style.display='flex';
            myPeer = new Peer(undefined, { host: '/', port: '443', path: '/peerjs', secure: true });
            myPeer.on('open', id => socket.emit('register-user', { peerId: id, name: myNick }));
            myPeer.on('call', c => { currentCall = c; document.getElementById('call-overlay').style.display='flex'; document.getElementById('ring').play().catch(()=>{}); });
        }
        async function accept() { 
            myStream = await navigator.mediaDevices.getUserMedia({ audio: true }); currentCall.answer(myStream);
            currentCall.on('stream', s => { const a = document.createElement('audio'); a.srcObject = s; a.play(); });
            closeUI();
        }
        function reject() { if(currentCall) currentCall.close(); closeUI(); }
        function closeUI() { document.getElementById('call-overlay').style.display='none'; document.getElementById('ring').pause(); }
        async function call() {
            const id = document.getElementById('tid').value; myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const c = myPeer.call(id, myStream);
            c.on('stream', s => { const a = document.createElement('audio'); a.srcObject = s; a.play(); });
        }
        function send() { const m = document.getElementById('msg').value; if(m) { socket.emit('chat message', { name: myNick, text: m }); document.getElementById('msg').value=''; } }
        socket.on('chat message', m => { const d = document.createElement('div'); d.innerText = m.name + ": " + m.text; document.getElementById('chat').appendChild(d); });
        socket.on('update-user-list', u => { 
            const l = document.getElementById('user-list'); l.innerHTML = '';
            u.forEach(user => { if(myPeer && user.id !== myPeer.id) { const i = document.createElement('div'); i.innerText = user.name; i.onclick = () => document.getElementById('tid').value = user.id; l.appendChild(i); } });
        });
    </script>
</body>
</html>
