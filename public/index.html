<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BURMALDSCORD | HQ</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Consolas', monospace; margin: 0; overflow: hidden; }
        #auth-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-card { border: 2px solid #00ff41; padding: 40px; background: #0a0a0a; text-align: center; }
        #app { display: none; height: 100vh; display: flex; }
        #sidebar { width: 300px; border-right: 1px solid #111; padding: 20px; display: flex; flex-direction: column; }
        #user-list { flex: 1; overflow-y: auto; }
        .user-node { padding: 10px; border: 1px solid #111; margin-bottom: 8px; background: #050505; cursor: pointer; }
        .user-node:hover { border-color: #00ff41; }
        #main { flex: 1; position: relative; background: #080808; display: flex; flex-direction: column; }
        #chat { flex: 1; padding: 20px; overflow-y: auto; }
        #call-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        input { background: #000; border: 1px solid #222; color: #00ff41; padding: 10px; font-family: inherit; }
        button { cursor: pointer; background: #00ff41; color: #000; border: none; padding: 10px 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="auth-overlay">
        <div class="auth-card">
            <h1>BURMALDSCORD</h1>
            <input id="nick" placeholder="ПОЗЫВНОЙ...">
            <button onclick="start()">ВХОД</button>
        </div>
    </div>

    <div id="app">
        <div id="sidebar">
            <div style="color:#444; margin-bottom:10px;">В СЕТИ:</div>
            <div id="user-list"></div>
        </div>
        <div id="main">
            <div id="call-overlay">
                <h2 id="caller-display">ВХОДЯЩИЙ...</h2>
                <button style="background:#00c851" onclick="accept()">ПРИНЯТЬ</button>
                <button style="background:#ff3547" onclick="reject()">СБРОСИТЬ</button>
                <audio id="ring" loop src="ringtone.mp3"></audio>
            </div>
            <div id="chat"></div>
            <div style="padding:20px; display:flex; gap:10px;">
                <input id="msg" style="flex:1" placeholder="Базарни че-нить..." onkeypress="if(event.key==='Enter')send()">
                <button onclick="send()">БАЗАР</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        const socket = io();
        let myPeer, myStream, currentCall, myNick;

        function start() {
            myNick = document.getElementById('nick').value;
            if(!myNick) return;
            document.getElementById('auth-overlay').style.display='none';
            document.getElementById('app').style.display='flex';

            myPeer = new Peer(undefined, {
                host: location.hostname,
                port: location.port || (location.protocol === 'https:' ? 443 : 80),
                path: '/peerjs',
                secure: location.protocol === 'https:'
            });

            myPeer.on('open', id => {
                socket.emit('register-user', { peerId: id, name: myNick });
            });

            myPeer.on('call', c => {
                currentCall = c;
                document.getElementById('call-overlay').style.display='flex';
                document.getElementById('ring').play().catch(() => {});
            });
        }

        async function accept() {
            myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            currentCall.answer(myStream);
            currentCall.on('stream', s => {
                const a = new Audio(); a.srcObject = s; a.play();
            });
            stopRing();
        }

        function reject() { currentCall.close(); stopRing(); }
        function stopRing() { 
            document.getElementById('call-overlay').style.display='none';
            document.getElementById('ring').pause();
        }

        async function callUser(id) {
            myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const c = myPeer.call(id, myStream);
            c.on('stream', s => {
                const a = new Audio(); a.srcObject = s; a.play();
            });
        }

        function send() {
            const m = document.getElementById('msg').value;
            if(m) { socket.emit('chat message', { name: myNick, text: m }); document.getElementById('msg').value=''; }
        }

        socket.on('chat message', m => {
            const d = document.createElement('div');
            d.innerHTML = `<b style="color:#00ff41">${m.name}:</b> ${m.text}`;
            document.getElementById('chat').appendChild(d);
        });

        socket.on('update-user-list', users => {
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            users.forEach(u => {
                if(myPeer && u.id !== myPeer.id) {
                    const btn = document.createElement('div');
                    btn.className = 'user-node';
                    btn.innerHTML = u.name;
                    btn.onclick = () => callUser(u.id);
                    list.appendChild(btn);
                }
            });
        });
    </script>
</body>
</html>
